# Local development stack for go-lgtmp
#
# Starts the full LGTMP observability stack + PostgreSQL + Redis.
# The Go service itself runs locally with `go run ./cmd/server` so you
# can iterate quickly without rebuilding the image.
#
# Usage:
#   make infra         # docker compose up -d
#   make run           # go run ./cmd/server
#   make load          # generate demo traffic
#   make infra-down    # docker compose down -v

services:

  # ── Databases ─────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no  # memory-only for dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Observability pipeline ─────────────────────────────────────────────────

  tempo:
    image: grafana/tempo:latest
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana datasource)
      - "9095:9095"   # Tempo gRPC
      # Port 4317 (OTLP gRPC from Alloy) is accessible within the Docker network
      # without being published to the host — no entry needed here.
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:3200/ready -O /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:3100/ready -O /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mimir:
    image: grafana/mimir:latest
    ports:
      - "9009:9009"
    volumes:
      - ./observability/mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir_data:/data
    command: -config.file=/etc/mimir/mimir.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:9009/ready -O /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  pyroscope:
    image: grafana/pyroscope:latest
    ports:
      - "4040:4040"
    volumes:
      - pyroscope_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:4040/ready -O /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Grafana Alloy: OTel collector + Prometheus scraper + log forwarder.
  # See alloy/config.alloy for the full pipeline definition.
  alloy:
    image: grafana/alloy:latest
    ports:
      - "4317:4317"   # OTLP gRPC  (traces + logs from Go service)
      - "4318:4318"   # OTLP HTTP
      - "12345:12345" # Alloy UI — http://localhost:12345
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run /etc/alloy/config.alloy --server.http.listen-addr=0.0.0.0:12345
    # host.docker.internal lets Alloy scrape /metrics from the Go service running
    # on the host machine.
    # - Docker Desktop (Mac/Windows): works automatically.
    # - Docker Engine (Linux): resolved via the host-gateway extra host below.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
      mimir:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"   # Grafana UI — http://localhost:3000
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
      mimir:
        condition: service_healthy
      pyroscope:
        condition: service_healthy

volumes:
  postgres_data:
  tempo_data:
  loki_data:
  mimir_data:
  pyroscope_data:
  grafana_data:
