# Tempo configuration for the go-lgtmp local dev stack.
# Verified against grafana/tempo:2.10.1
#
# Single-node pattern: memberlist gossip ring with inmemory kvstore keeps
# all ring state in-process. The ingester registers itself so the querier can
# find live (WAL) data without "empty ring" errors.
#
# Receives OTLP traces from Grafana Alloy and stores them locally.
# The metrics generator builds service-graph and span-metrics from traces
# and remote-writes them to Mimir — this powers the Grafana Tempo service map.

server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  log_level: warn

# ── Trace ingestion ──────────────────────────────────────────────────────────
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

# ── Ingester ─────────────────────────────────────────────────────────────────
# lifecycler.ring.kvstore.store: inmemory registers the ingester in an
# in-process ring. The querier's frontend_worker (below) then finds it
# without needing an external KV store.
ingester:
  max_block_duration: 5m
  trace_idle_period: 10s
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    min_ready_duration: 1s

# ── Memberlist ────────────────────────────────────────────────────────────────
# Loopback-only gossip — single node, no real cluster needed.
memberlist:
  bind_addr: [127.0.0.1]
  bind_port: 7947

# ── Querier ───────────────────────────────────────────────────────────────────
# frontend_worker connects back to the query_frontend running in the same
# process so searches fan out to the local ingester via the in-memory ring.
querier:
  frontend_worker:
    frontend_address: 127.0.0.1:9095

# ── Storage ──────────────────────────────────────────────────────────────────
storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

# ── Metrics generator ────────────────────────────────────────────────────────
# Generates Prometheus metrics FROM trace spans. Enables the service map
# visualization in the Grafana Tempo datasource.
#
# service-graphs: service-to-service call counts and latency
#   → tempo_service_graph_request_total, …_duration_seconds
# span-metrics: RED metrics derived from span data
#   → traces_spanmetrics_calls_total, …_duration_seconds
#
# Remote-written to Mimir and used by the Grafana Tempo service map panel.
metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: docker-compose
  # traces_storage: required for the local-blocks processor (TraceQL metrics API).
  # Stores raw trace data so the querier can execute TraceQL metric queries
  # (used by Grafana Explore Traces / Traces Drilldown).
  traces_storage:
    path: /var/tempo/generator/traces
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://mimir:9009/api/v1/push
        send_exemplars: true

# ── Per-tenant overrides ──────────────────────────────────────────────────────
# In single-tenant mode "anonymous" is the default tenant.
# local-blocks: powers the TraceQL metrics API (Grafana Explore Traces app)
overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics, local-blocks]
